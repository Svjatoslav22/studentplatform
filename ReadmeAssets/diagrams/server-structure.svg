<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">server.js маршрути контролери MySQL</title>
  <desc id="desc">Спрощена діаграма архітектури: server.js, маршрути, контролери та база MySQL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <style>
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 3; rx: 18; ry: 18; }
      .db { fill: #fff7ed; stroke: #f97316; stroke-width: 3; }
      .label { font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .subtitle { font-family: Arial, sans-serif; font-size: 22px; fill: #1d4ed8; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#bg)"/>

  <rect class="box" x="70" y="170" width="210" height="120" rx="18" ry="18"/>
  <text class="label" x="175" y="215" text-anchor="middle">server.js</text>
  <text class="small" x="175" y="245" text-anchor="middle">Express‑додаток</text>
  <text class="small" x="175" y="270" text-anchor="middle">middleware та пул з'єднань</text>

  <rect class="box" x="350" y="90" width="220" height="120" rx="18" ry="18"/>
  <text class="label" x="460" y="135" text-anchor="middle">Маршрути</text>
  <text class="small" x="460" y="165" text-anchor="middle">auth, users</text>
  <text class="small" x="460" y="190" text-anchor="middle">questions, timetable</text>

  <rect class="box" x="350" y="290" width="220" height="120" rx="18" ry="18"/>
  <text class="label" x="460" y="335" text-anchor="middle">Контролери</text>
  <text class="small" x="460" y="365" text-anchor="middle">валідація та логіка</text>
  <text class="small" x="460" y="390" text-anchor="middle">JSON‑відповіді</text>

  <rect class="box" x="650" y="290" width="220" height="120" rx="18" ry="18"/>
  <text class="label" x="760" y="335" text-anchor="middle">Сервіси</text>
  <text class="small" x="760" y="365" text-anchor="middle">бізнес‑правила</text>
  <text class="small" x="760" y="390" text-anchor="middle">мапінг даних</text>

  <rect class="db" x="930" y="170" width="190" height="150" rx="18" ry="18"/>
  <text class="label" x="1025" y="215" text-anchor="middle">MySQL</text>
  <text class="small" x="1025" y="245" text-anchor="middle">таблиці</text>
  <text class="small" x="1025" y="270" text-anchor="middle">FK / індекси</text>
  <text class="small" x="1025" y="295" text-anchor="middle">персистентні дані</text>

  <path class="arrow" d="M280 230 L350 150"/>
  <path class="arrow" d="M280 240 L350 350"/>
  <path class="arrow" d="M570 150 L650 150 L650 335"/>
  <path class="arrow" d="M870 350 L930 245"/>

  <text class="subtitle" x="600" y="50" text-anchor="middle">Огляд серверної архітектури</text>
</svg>